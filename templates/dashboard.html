<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Aplikacji - Fullscreen</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

    <div class="dashboard-container">
        <nav class="top-nav">
            <div class="nav-tab active">DASHBOARD</div>
            <div class="nav-tab">ZADANIA</div>
            <div class="nav-tab">NOTATKI</div>
            <div class="nav-tab">BAZA WIEDZY</div>
            <div class="nav-tab">CHAT</div>
        </nav>

        <div class="content-area">
            
            <div class="left-column">
                
                <div class="panel task-panel">
                    <div class="panel-header">
                        <b>ZADANIA</b>
                        <span id="add-task-btn" style="cursor:pointer; font-size: 20px;">+</span>
                    </div>
                    <div class="task-list">
                        
                    </div>
                </div>

                <div class="panel summary-panel">
                    <div class="panel-header">
                        <b>PODSUMOWANIE DNIA</b>
                    </div>
                    <div class="summary-stats">
                        <div class="stat-row">
                            <span id="task-counter">Wykonane: 2 / 4</span>
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" id="task-progress"></div>
                            </div>
                        </div>
                        <div class="stat-row">
                            <span style="color: var(--text-muted)">Średni czas:</span>
                            <span>45 min</span>
                        </div>
                        <div class="stat-row">
                            <span style="color: var(--text-muted)">Priorytety jutra:</span>
                            <span>3</span>
                        </div>
                    </div>
                </div>

            </div>

            <div class="panel calendar-panel">
                <div class="panel-header">
                    <b>KALENDARZ</b>
                </div>
                <div class="calendar-header">
                    <div class="calendar-title" id="month-year-display">MARZEC 2026</div>
                    <div class="nav-arrows">
                        <span id="prev-month">&lt;</span>
                        <span id="next-month">&gt;</span>
                    </div>
                </div>

                <div class="calendar-container">
                    <div class="day-names">
                        <div>Pn</div><div>Wt</div><div>Śr</div><div>Cz</div><div>Pt</div><div>So</div><div>Nd</div>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        </div>
                </div>
            </div>

        </div>
    </div>




    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal-content panel">
            <div class="panel-header" style="margin-bottom: 20px;">
                <b>DODAJ ZADANIE</b>
                <span id="close-modal-btn" style="cursor:pointer; font-size: 20px;">&times;</span>
            </div>
            
            <div class="form-group">
                <label>Tytuł</label>
                <input type="text" id="task-title" class="form-input" placeholder="Tytuł">
            </div>

            <div class="form-group">
                <label>Status</label>
                <select id="task-status" class="form-input"></select>
            </div>

            <div class="form-group">
                <label>Data do</label>
                <div id="date-picker-btn" class="form-input custom-dropdown">Wybierz datę...</div>
                
                <div id="mini-calendar-container" class="mini-calendar hidden">
                    <div class="calendar-header" style="margin-bottom: 10px;">
                        <div id="mini-month-year" style="font-size: 14px; font-weight: bold;"></div>
                        <div class="nav-arrows" style="font-size: 16px;">
                            <span id="mini-prev">&lt;</span>
                            <span id="mini-next">&gt;</span>
                        </div>
                    </div>
                    <div class="day-names" style="margin-bottom: 5px; font-size: 12px;">
                        <div>Pn</div><div>Wt</div><div>Śr</div><div>Cz</div><div>Pt</div><div>So</div><div>Nd</div>
                    </div>
                    <div id="mini-calendar-grid" class="calendar-grid" style="gap: 5px; font-size: 12px; grid-auto-rows: 30px;">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Tag</label>
                <select id="task-tag" class="form-input"></select>

                <div id="new-tag-container" class="hidden" style="display: flex; gap: 8px; align-items: center; margin-top: 5px;">
                    <input type="text" id="new-tag-name" class="form-input" placeholder="Nazwa tagu..." style="flex-grow: 1; padding: 8px;">
                    
                    <input type="color" id="new-tag-color" value="#00ff7f" style="width: 36px; height: 36px; border: none; border-radius: 4px; cursor: pointer; background: transparent; padding: 0;">
                    
                    <button id="save-new-tag-btn" type="button" style="background: var(--accent-green); border: none; border-radius: 4px; padding: 8px 12px; cursor: pointer; font-weight: bold; color: #000;">&#10004;</button>
                    <button id="cancel-new-tag-btn" type="button" style="background: var(--item-bg); border: 1px solid var(--text-muted); border-radius: 4px; padding: 8px 12px; cursor: pointer; font-weight: bold; color: var(--text-main);">&#10006;</button>
                </div>
            </div>      

            <div class="form-group">
                <label>Opis</label>
                <textarea id="task-desc" class="form-input" rows="3" placeholder="Dodatkowe informacje..."></textarea>
            </div>

            <button class="btn-save">DODAJ ZADANIE</button>
        </div>
    </div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
